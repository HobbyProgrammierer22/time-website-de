<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

/* Smooth Animation */
body {
    animation: fadeIn 1.5s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Digital Clock */
#clock {
    font-size: 70px;
    margin-top: 30px;
}

/* Analog Clock */
.clock {
    width: 220px;
    height: 220px;
    border: 6px solid white;
    border-radius: 50%;
    margin: 30px auto;
    position: relative;
}

.hand {
    position: absolute;
    top: 50%;
    transform-origin: 100%;
    background: white;
}

.hour { width: 35%; height: 4px; }
.minute { width: 45%; height: 3px; }
.second { width: 50%; height: 2px; background: red; }

/* Sections */
.section {
    margin-top: 40px;
}

/* Buttons */
button {
    margin: 10px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Input */
input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<h1>TIME</h1>

<!-- Digital Clock -->
<div id="clock"></div>

<!-- Analog Clock -->
<div class="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
</div>

<!-- World Time -->
<div class="section">
<h2>Weltzeit</h2>

<select id="timezone">
    <option value="Europe/Berlin">Deutschland 🇩🇪</option>
    <option value="America/New_York">New York 🇺🇸</option>
    <option value="Europe/London">London 🇬🇧</option>
    <option value="Asia/Tokyo">Tokyo 🇯🇵</option>
    <option value="Australia/Sydney">Sydney 🇦🇺</option>
</select>

<div id="world" style="font-size:30px; margin-top:10px;"></div>
</div>

<!-- Timer -->
<div class="section">
<h2>Timer</h2>
<input type="number" id="minutes" placeholder="Minuten">
<button onclick="startTimer()">Start</button>
<div id="timer"></div>
</div>

<!-- Stopwatch -->
<div class="section">
<h2>Stoppuhr</h2>
<div id="stopwatch">0.0</div>
<button onclick="startStopwatch()">Start</button>
<button onclick="stopStopwatch()">Stop</button>
<button onclick="resetStopwatch()">Reset</button>
</div>

<script>
// Digital Clock
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString("de-DE");
}
setInterval(updateClock, 1000);

// Analog Clock
function updateAnalog() {
    let now = new Date();
    let sec = now.getSeconds() * 6;
    let min = now.getMinutes() * 6;
    let hr = now.getHours() * 30;

    document.getElementById("second").style.transform = `rotate(${sec}deg)`;
    document.getElementById("minute").style.transform = `rotate(${min}deg)`;
    document.getElementById("hour").style.transform = `rotate(${hr}deg)`;
}
setInterval(updateAnalog, 1000);

// World Time with selection
function updateWorld() {
    let now = new Date();
    let zone = document.getElementById("timezone").value;

    let time = now.toLocaleTimeString("de-DE", { timeZone: zone });

    document.getElementById("world").innerText = time;
}
setInterval(updateWorld, 1000);

// Timer
function startTimer() {
    let min = document.getElementById("minutes").value;
    let time = min * 60;

    let interval = setInterval(() => {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById("timer").innerText = m + ":" + (s < 10 ? "0"+s : s);

        time--;
        if (time < 0) {
            clearInterval(interval);
            alert("Fertig!");
        }
    }, 1000);
}

// Stopwatch
let sw = 0;
let running = false;
let interval;

function startStopwatch() {
    if (!running) {
        running = true;
        interval = setInterval(() => {
            sw += 0.1;
            document.getElementById("stopwatch").innerText = sw.toFixed(1);
        }, 100);
    }
}

function stopStopwatch() {
    running = false;
    clearInterval(interval);
}

function resetStopwatch() {
    sw = 0;
    document.getElementById("stopwatch").innerText = "0.0";
}
</script>

</body>
</html>
