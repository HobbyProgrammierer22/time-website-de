<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle, #1a0000, #000000);
    color:white;
    text-align:center;
}

/* Karte */
.card{
    margin:40px auto;
    padding:30px;
    width:90%;
    max-width:700px;
    border-radius:20px;
    background: rgba(255,0,0,0.05);
    box-shadow:0 0 30px red;
}

/* Layout */
.row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
}

/* Digital */
.digital{
    font-size:60px;
    text-shadow:0 0 15px red;
}

/* CLOCK */
.clock{
    width:220px;
    height:220px;
    border:4px solid red;
    border-radius:50%;
    position:relative;
    box-shadow:0 0 20px red inset, 0 0 20px red;
}

/* CENTER */
.center{
    width:10px;
    height:10px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
}

/* HAND BASE */
.hand{
    position:absolute;
    top:50%;
    left:50%;
    transform-origin: 0% 50%;
}

/* HOUR */
.hour{
    width:50px;
    height:4px;
    background:white;
}

/* MINUTE */
.minute{
    width:70px;
    height:3px;
    background:white;
}

/* SECOND */
.second{
    width:90px;
    height:2px;
    background:red;
}

/* Zahlen */
.number{
    position:absolute;
    width:100%;
    height:100%;
    text-align:center;
    transform: rotate(calc(30deg * var(--n)));
}
.number span{
    display:block;
    transform: rotate(calc(-30deg * var(--n)));
}

/* Buttons */
button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
    margin:5px;
    cursor:pointer;
}

/* Inputs */
input, select{
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<h1>TIME</h1>

<!-- MAIN -->
<div class="card">
<div class="row">
<div class="digital" id="clock"></div>
<div class="clock" id="mainClock"></div>
</div>
</div>

<!-- WORLD -->
<div class="card">
<h2>WELTZEIT</h2>

<select id="timezone">
<option value="Europe/Berlin">Deutschland</option>
<option value="America/New_York">New York</option>
<option value="Asia/Tokyo">Tokyo</option>
<option value="Europe/London">London</option>
</select>

<div class="row">
<div class="digital" id="world"></div>
<div class="clock" id="worldClock"></div>
</div>
</div>

<!-- TIMER -->
<div class="card">
<h2>TIMER</h2>

<input type="number" id="minutes" placeholder="Minuten">
<button onclick="startTimer()">Start</button>
<button onclick="stopSound()">Stop</button>

<div class="digital" id="timer">0:00</div>
</div>

<!-- STOPWATCH -->
<div class="card">
<h2>STOPPUHR</h2>

<div class="digital" id="stopwatch">0.0</div>

<button onclick="startSW()">Start</button>
<button onclick="stopSW()">Stop</button>
<button onclick="resetSW()">Reset</button>
</div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

/* CLOCK BUILD */
function createClock(el){
    // Zahlen
    for(let i=1;i<=12;i++){
        let d=document.createElement("div");
        d.className="number";
        d.style.setProperty('--n',i);
        d.innerHTML="<span>"+i+"</span>";
        el.appendChild(d);
    }

    // Zeiger
    let h=document.createElement("div");
    h.className="hand hour";
    let m=document.createElement("div");
    m.className="hand minute";
    let s=document.createElement("div");
    s.className="hand second";

    el.appendChild(h);
    el.appendChild(m);
    el.appendChild(s);

    // Mittelpunkt
    let c=document.createElement("div");
    c.className="center";
    el.appendChild(c);

    return {h,m,s};
}

let main=createClock(document.getElementById("mainClock"));
let world=createClock(document.getElementById("worldClock"));

/* UPDATE */
function update(){
    let now=new Date();

    // DIGITAL
    document.getElementById("clock").innerText=
        now.toLocaleTimeString("de-DE");

    // WINKEL
    let sec=now.getSeconds()*6;
    let min=now.getMinutes()*6;
    let hr=now.getHours()*30 + now.getMinutes()*0.5;

    // HAUPTUHR
    main.s.style.transform=`rotate(${sec}deg)`;
    main.m.style.transform=`rotate(${min}deg)`;
    main.h.style.transform=`rotate(${hr}deg)`;

    // WELTZEIT
    let zone=document.getElementById("timezone").value;
    document.getElementById("world").innerText=
        now.toLocaleTimeString("de-DE",{timeZone:zone});

    world.s.style.transform=`rotate(${sec}deg)`;
    world.m.style.transform=`rotate(${min}deg)`;
    world.h.style.transform=`rotate(${hr}deg)`;
}

setInterval(update,1000);

/* TIMER */
let t;
function startTimer(){
    let time=document.getElementById("minutes").value*60;

    t=setInterval(()=>{
        let m=Math.floor(time/60);
        let s=time%60;

        document.getElementById("timer").innerText=
            m+":"+(s<10?"0"+s:s);

        time--;

        if(time<0){
            clearInterval(t);
            let a=document.getElementById("alarm");
            a.play().catch(()=>{});
        }
    },1000);
}

function stopSound(){
    let a=document.getElementById("alarm");
    a.pause();
    a.currentTime=0;
}

/* STOPWATCH */
let sw=0,run=false,int;

function startSW(){
    if(!run){
        run=true;
        int=setInterval(()=>{
            sw+=0.1;
            document.getElementById("stopwatch").innerText=sw.toFixed(1);
        },100);
    }
}

function stopSW(){
    run=false;
    clearInterval(int);
}

function resetSW(){
    sw=0;
    document.getElementById("stopwatch").innerText="0.0";
}

</script>

</body>
</html>
