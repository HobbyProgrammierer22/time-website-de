<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIME</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0000, #000000 80%);
    color:white;
    text-align:center;
}

/* 3D Karte */
.card {
    margin:40px auto;
    padding:30px;
    width:90%;
    max-width:700px;
    border-radius:25px;
    background: rgba(255,0,0,0.05);
    box-shadow: 0 0 40px rgba(255,0,0,0.4);
}

/* Layout */
.row {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
}

/* Digital */
.digital {
    font-size:60px;
    text-shadow:0 0 20px red;
}

/* ANALOG CLOCK */
.clock {
    width:220px;
    height:220px;
    border-radius:50%;
    position:relative;
    border:5px solid red;
    box-shadow:0 0 30px red;
}

/* Zahlen */
.number {
    position:absolute;
    width:100%;
    height:100%;
    text-align:center;
    transform: rotate(calc(30deg * var(--n)));
}

.number span {
    display:block;
    transform: rotate(calc(-30deg * var(--n)));
}

/* Zeiger FIXED */
.hand {
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin: bottom center;
    transform: translateX(-50%);
}

.hour {
    width:6px;
    height:50px;
    background:white;
    border-radius:3px;
}

.minute {
    width:4px;
    height:70px;
    background:white;
    border-radius:3px;
}

.second {
    width:2px;
    height:90px;
    background:red;
}

/* Buttons */
button {
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:red;
    color:white;
    margin:5px;
    cursor:pointer;
    box-shadow:0 0 10px red;
}

button:hover {
    transform:scale(1.1);
}

/* Inputs */
input, select {
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<h1 style="text-shadow:0 0 20px red;">TIME</h1>

<!-- MAIN -->
<div class="card">
<div class="row">
<div class="digital" id="clock"></div>
<div class="clock" id="mainClock"></div>
</div>
</div>

<!-- WORLD -->
<div class="card">
<h2>WELTZEIT</h2>

<select id="timezone">
<option value="Europe/Berlin">Deutschland 🇩🇪</option>
<option value="America/New_York">New York 🇺🇸</option>
<option value="Asia/Tokyo">Tokyo 🇯🇵</option>
<option value="Europe/London">London 🇬🇧</option>
</select>

<div class="row">
<div class="digital" id="world"></div>
<div class="clock" id="worldClock"></div>
</div>
</div>

<!-- TIMER -->
<div class="card">
<h2>TIMER</h2>

<input type="number" id="minutes" placeholder="Minuten">
<button onclick="startTimer()">Start</button>
<button onclick="stopSound()">Stop Sound</button>

<div class="digital" id="timer">0:00</div>
</div>

<!-- STOPWATCH -->
<div class="card">
<h2>STOPPUHR</h2>

<div class="digital" id="stopwatch">0.0</div>

<button onclick="startSW()">Start</button>
<button onclick="stopSW()">Stop</button>
<button onclick="resetSW()">Reset</button>
</div>

<audio id="alarm" preload="auto">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>

/* ZAHLEN */
function createNumbers(clock){
    for(let i=1;i<=12;i++){
        let div=document.createElement("div");
        div.className="number";
        div.style.setProperty('--n', i);
        div.innerHTML="<span>"+i+"</span>";
        clock.appendChild(div);
    }
}

/* ZEIGER */
function createHands(clock){
    let h=document.createElement("div");
    h.className="hand hour";
    let m=document.createElement("div");
    m.className="hand minute";
    let s=document.createElement("div");
    s.className="hand second";

    clock.appendChild(h);
    clock.appendChild(m);
    clock.appendChild(s);

    return {h,m,s};
}

/* CLOCK SETUP */
let mainClock=document.getElementById("mainClock");
let worldClock=document.getElementById("worldClock");

createNumbers(mainClock);
createNumbers(worldClock);

let main=createHands(mainClock);
let world=createHands(worldClock);

/* UPDATE */
function update(){
    let now=new Date();

    // Digital Haupt
    document.getElementById("clock").innerText=now.toLocaleTimeString("de-DE");

    // Analog Haupt
    let sec=now.getSeconds()*6;
    let min=now.getMinutes()*6;
    let hr=now.getHours()*30;

    main.s.style.transform=`translateX(-50%) rotate(${sec}deg)`;
    main.m.style.transform=`translateX(-50%) rotate(${min}deg)`;
    main.h.style.transform=`translateX(-50%) rotate(${hr}deg)`;

    // Weltzeit
    let zone=document.getElementById("timezone").value;
    let wtime=now.toLocaleTimeString("de-DE",{timeZone:zone});
    document.getElementById("world").innerText=wtime;

    world.s.style.transform=`translateX(-50%) rotate(${sec}deg)`;
    world.m.style.transform=`translateX(-50%) rotate(${min}deg)`;
    world.h.style.transform=`translateX(-50%) rotate(${hr}deg)`;
}

setInterval(update,1000);

/* TIMER */
let tInt;

function startTimer(){
    let t=document.getElementById("minutes").value*60;

    tInt=setInterval(()=>{
        let m=Math.floor(t/60);
        let s=t%60;

        document.getElementById("timer").innerText=m+":"+(s<10?"0"+s:s);

        t--;
        if(t<0){
            clearInterval(tInt);
            let a=document.getElementById("alarm");
            a.currentTime=0;
            a.play().catch(()=>{});
        }
    },1000);
}

function stopSound(){
    let a=document.getElementById("alarm");
    a.pause();
    a.currentTime=0;
}

/* STOPWATCH */
let sw=0, run=false, int;

function startSW(){
    if(!run){
        run=true;
        int=setInterval(()=>{
            sw+=0.1;
            document.getElementById("stopwatch").innerText=sw.toFixed(1);
        },100);
    }
}

function stopSW(){
    run=false;
    clearInterval(int);
}

function resetSW(){
    sw=0;
    document.getElementById("stopwatch").innerText="0.0";
}

</script>

</body>
</html>
