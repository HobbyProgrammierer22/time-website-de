<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #000000, #1a0000, #330000);
    color: white;
    text-align: center;
}

/* Glow Effekt */
.glow {
    text-shadow: 0 0 10px red, 0 0 20px red;
}

/* Layout */
.row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 50px;
    flex-wrap: wrap;
}

/* Digital Clock */
.digital {
    font-size: 70px;
}

/* Analog Clock */
.clock {
    width: 180px;
    height: 180px;
    border: 5px solid red;
    border-radius: 50%;
    position: relative;
    box-shadow: 0 0 20px red;
}

.hand {
    position: absolute;
    top: 50%;
    transform-origin: 100%;
    background: white;
}

.hour { width: 30%; height: 4px; }
.minute { width: 45%; height: 3px; }
.second { width: 50%; height: 2px; background: red; }

/* Sections */
.section {
    padding: 80px 20px;
}

/* Buttons */
button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: red;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 10px red;
}

button:hover {
    transform: scale(1.1);
}

/* Input */
input, select {
    padding: 10px;
    border-radius: 10px;
    border: none;
}
</style>
</head>

<body>

<!-- TOP CLOCK -->
<div class="section">
<h1 class="glow">TIME</h1>

<div class="row">
    <div class="digital glow" id="clock"></div>

    <div class="clock">
        <div class="hand hour" id="hour"></div>
        <div class="hand minute" id="minute"></div>
        <div class="hand second" id="second"></div>
    </div>
</div>
</div>

<!-- WORLD TIME -->
<div class="section">
<h2 class="glow">WELTZEIT</h2>

<select id="timezone">
    <option value="Europe/Berlin">Deutschland 🇩🇪</option>
    <option value="America/New_York">New York 🇺🇸</option>
    <option value="Asia/Tokyo">Tokyo 🇯🇵</option>
    <option value="Europe/London">London 🇬🇧</option>
</select>

<div class="row">
    <div class="digital glow" id="worldDigital"></div>

    <div class="clock">
        <div class="hand hour" id="whour"></div>
        <div class="hand minute" id="wminute"></div>
        <div class="hand second" id="wsecond"></div>
    </div>
</div>
</div>

<!-- TIMER -->
<div class="section">
<h2 class="glow">TIMER</h2>

<input type="number" id="minutes" placeholder="Minuten">
<button onclick="startTimer()">Start</button>
<button onclick="stopSound()">Stop Sound</button>

<div class="row">
    <div class="digital glow" id="timer">0:00</div>

    <div class="clock">
        <div class="hand hour" id="thour"></div>
        <div class="hand minute" id="tminute"></div>
        <div class="hand second" id="tsecond"></div>
    </div>
</div>
</div>

<!-- STOPWATCH -->
<div class="section">
<h2 class="glow">STOPPUHR</h2>

<div class="digital glow" id="stopwatch">0.0</div>

<button onclick="startStopwatch()">Start</button>
<button onclick="stopStopwatch()">Stop</button>
<button onclick="resetStopwatch()">Reset</button>
</div>

<audio id="alarm">
<source src="https://www.soundjay.com/buttons/beep-07.wav" type="audio/wav">
</audio>

<script>
// MAIN CLOCK
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString("de-DE");

    let sec = now.getSeconds()*6;
    let min = now.getMinutes()*6;
    let hr = now.getHours()*30;

    document.getElementById("second").style.transform = `rotate(${sec}deg)`;
    document.getElementById("minute").style.transform = `rotate(${min}deg)`;
    document.getElementById("hour").style.transform = `rotate(${hr}deg)`;
}
setInterval(updateClock,1000);

// WORLD CLOCK
function updateWorld() {
    let zone = document.getElementById("timezone").value;
    let now = new Date();

    let time = now.toLocaleTimeString("de-DE",{timeZone:zone});
    document.getElementById("worldDigital").innerText = time;

    let sec = now.getSeconds()*6;
    let min = now.getMinutes()*6;
    let hr = now.getHours()*30;

    document.getElementById("wsecond").style.transform = `rotate(${sec}deg)`;
    document.getElementById("wminute").style.transform = `rotate(${min}deg)`;
    document.getElementById("whour").style.transform = `rotate(${hr}deg)`;
}
setInterval(updateWorld,1000);

// TIMER
let timerInterval;
function startTimer(){
    let time = document.getElementById("minutes").value*60;

    timerInterval = setInterval(()=>{
        let m=Math.floor(time/60);
        let s=time%60;
        document.getElementById("timer").innerText=m+":"+(s<10?"0"+s:s);

        time--;
        if(time<0){
            clearInterval(timerInterval);
            document.getElementById("alarm").play();
        }
    },1000);
}

function stopSound(){
    let audio=document.getElementById("alarm");
    audio.pause();
    audio.currentTime=0;
}

// STOPWATCH
let sw=0, running=false, swInterval;

function startStopwatch(){
    if(!running){
        running=true;
        swInterval=setInterval(()=>{
            sw+=0.1;
            document.getElementById("stopwatch").innerText=sw.toFixed(1);
        },100);
    }
}

function stopStopwatch(){
    running=false;
    clearInterval(swInterval);
}

function resetStopwatch(){
    sw=0;
    document.getElementById("stopwatch").innerText="0.0";
}
</script>

</body>
</html>
